<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Game</title>

<style>
body { font-family: Arial; padding:16px; }
button { width:100%; padding:16px; font-size:20px; margin:6px 0; }
#panel { white-space:pre-line; background:#f3f3f3; padding:12px; border-radius:10px; }
#status { position:absolute; left:-9999px; }
</style>
</head>

<body>

<div id="panel"></div>
<div id="status" aria-live="polite"></div>

<button onclick="feed()">🍽 Alimentar</button>
<button onclick="bottle()">🍼 Preparar biberón</button>
<button onclick="playGame()">🎲 Jugar</button>

<button onclick="soothe()">🤱 Arrullar</button>
<button onclick="sleepBed()">🛏 Acostar y tapar</button>

<button onclick="bathWater()">💧 Dar agua</button>
<button onclick="bathSoap()">🧼 Dar jabón</button>
<button onclick="bathRinse()">🚿 Aclarar</button>
<button onclick="bathDry()">🧽 Secar</button>

<button onclick="diaper()">🧷 Cambiar pañal</button>
<button onclick="pacifier()">🍼 Chupete</button>
<button onclick="walk()">🌳 Paseo</button>
<button onclick="dress()">👕 Vestir</button>
<button onclick="rattle()">🪇 Sonajero</button>
<button onclick="hug()">🤗 Abrazar</button>

<audio id="cry_hunger" src="cry_hunger.mp3"></audio>
<audio id="cry_sleep" src="cry_sleep.mp3"></audio>
<audio id="cry_discomfort" src="cry_discomfort.mp3"></audio>

<audio id="bottle_prepare" src="bottle_prepare.mp3"></audio>
<audio id="bottle_drink" src="bottle_drink.mp3"></audio>

<audio id="laugh" src="laugh.mp3"></audio>
<audio id="babble" src="babble.mp3"></audio>

<audio id="sleep" src="sleep.mp3"></audio>
<audio id="musicbox" src="musicbox.mp3"></audio>
<audio id="blanket" src="blanket.mp3"></audio>

<audio id="bath_water" src="bath_water.mp3"></audio>
<audio id="bath_soap" src="bath_soap.mp3"></audio>
<audio id="bath_dry" src="bath_dry.mp3"></audio>

<audio id="diaper_sound" src="diaper.mp3"></audio>

<audio id="pacifier_sound" src="pacifier.mp3"></audio>
<audio id="outdoor_sound" src="outdoor.mp3"></audio>
<audio id="clothes_sound" src="clothes.mp3"></audio>
<audio id="rattle_sound" src="rattle.mp3"></audio>

<script>

document.addEventListener("click", initAudio, { once:true });

function initAudio(){
  document.querySelectorAll("audio").forEach(a=>{
    a.play().then(()=>{a.pause(); a.currentTime=0;}).catch(()=>{});
  });
}

let saved = localStorage.getItem("babySave");

let baby = saved ? JSON.parse(saved) : {
  hunger: 50,
  energy: 50,
  comfort: 50,
  affection: 50,
  mood: "normal",
  lastTime: Date.now()
};

let sleepReady = false;

function save(){
  baby.lastTime = Date.now();
  localStorage.setItem("babySave", JSON.stringify(baby));
}

function play(id){
  let a = document.getElementById(id);
  if(!a) return;
  a.currentTime = 0;
  a.play().catch(()=>{});
}

function updateMood(){
  if(baby.energy < 20) baby.mood = "cansado";
  else if(baby.hunger < 20 || baby.comfort < 20) baby.mood = "triste";
  else if(baby.affection > 70) baby.mood = "feliz";
  else baby.mood = "normal";

  announceMood();
}

function announceMood(){
  let text = "";

  if(baby.mood === "feliz") text = "El bebé está feliz";
  if(baby.mood === "triste") text = "El bebé está triste";
  if(baby.mood === "cansado") text = "El bebé está cansado";
  if(baby.affection < 25) text = "El bebé quiere mimos";

  document.getElementById("status").innerText = text;
}

function update(){
  updateMood();
  document.getElementById("panel").innerText =
    "Hambre: " + baby.hunger +
    " | Energía: " + baby.energy +
    " | Confort: " + baby.comfort +
    " | Afecto: " + baby.affection +
    " | Estado: " + baby.mood;
  save();
}

function feed(){ play("bottle_drink"); baby.hunger += 30; update(); }
function bottle(){ play("bottle_prepare"); }
function playGame(){ play("laugh"); baby.affection += 10; update(); }

function soothe(){
  play("musicbox");
  baby.energy += 8;
  baby.comfort += 5;

  if(Math.random() < 0.5){
    sleepReady = true;
  }

  update();
}

function sleepBed(){

  if(sleepReady){
    play("blanket");
    setTimeout(()=>play("sleep"), 1200);

    baby.energy += 30;
    sleepReady = false;

  } else {
    play("cry_sleep");
    baby.comfort -= 5;

    if(Math.random() < 0.3){
      sleepReady = true;
    }
  }

  update();
}

function bathWater(){ play("bath_water"); baby.comfort += 5; update(); }
function bathSoap(){ play("bath_soap"); baby.comfort += 5; update(); }
function bathRinse(){ play("bath_water"); baby.comfort += 5; update(); }
function bathDry(){ play("bath_dry"); baby.comfort += 10; update(); }

function diaper(){ play("diaper_sound"); baby.comfort += 15; update(); }
function pacifier(){ play("pacifier_sound"); baby.comfort += 10; update(); }
function walk(){ play("outdoor_sound"); baby.affection += 10; update(); }
function dress(){ play("clothes_sound"); baby.comfort += 10; update(); }
function rattle(){ play("rattle_sound"); baby.affection += 8; update(); }

function hug(){
  play("babble");
  baby.affection += 20;
  baby.comfort += 5;
  update();
}

setInterval(()=>{

  baby.hunger -= 0.3;
  baby.energy -= 0.25;
  baby.comfort -= 0.2;
  baby.affection -= 0.3;

  if(Math.random() < 0.15) play("babble");

  if(baby.hunger < 20 && Math.random() < 0.25) play("cry_hunger");
  else if(baby.energy < 20 && Math.random() < 0.25) play("cry_sleep");
  else if(baby.comfort < 20 && Math.random() < 0.25) play("cry_discomfort");

  update();

}, 15000);

function offlineProgress(){
  let now = Date.now();
  let diff = (now - baby.lastTime) / 1000;
  let decay = diff / 200;

  baby.hunger -= decay;
  baby.energy -= decay;
  baby.comfort -= decay;
  baby.affection -= decay;

  ["hunger","energy","comfort","affection"].forEach(k=>{
    if(baby[k] < 0) baby[k] = 0;
  });
}

offlineProgress();
update();

</script>

</body>
</html>
