<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Game</title>

<style>
body { font-family: Arial; padding:16px; }
button { width:100%; padding:16px; font-size:20px; margin:6px 0; }
#panel { white-space:pre-line; background:#f3f3f3; padding:12px; border-radius:10px; }
</style>
</head>

<body>

<div id="panel"></div>

<button onclick="feed()">🍽 Alimentar</button>
<button onclick="bottle()">🍼 Preparar biberón</button>
<button onclick="playGame()">🎲 Jugar</button>
<button onclick="sleepBaby()">😴 Dormir</button>
<button onclick="bath()">🛁 Baño</button>
<button onclick="diaper()">🧷 Cambiar pañal</button>

<!-- AUDIOS -->
<audio id="cry_hunger" src="cry_hunger.mp3"></audio>
<audio id="cry_sleep" src="cry_sleep.mp3"></audio>
<audio id="cry_discomfort" src="cry_discomfort.mp3"></audio>

<audio id="bottle_prepare" src="bottle_prepare.mp3"></audio>
<audio id="bottle_drink" src="bottle_drink.mp3"></audio>

<audio id="laugh" src="laugh.mp3"></audio>
<audio id="sleep" src="sleep.mp3"></audio>

<audio id="bath_water" src="bath_water.mp3"></audio>
<audio id="bath_soap" src="bath_soap.mp3"></audio>
<audio id="bath_dry" src="bath_dry.mp3"></audio>

<audio id="diaper_sound" src="diaper.mp3"></audio>

<script>

//////////////////////////////////////////////////////
// 🔊 FIX REAL DE AUDIO (IMPORTANTE PARA GITHUB PAGES)
//////////////////////////////////////////////////////

document.addEventListener("click", initAudio, { once:true });

function initAudio(){
  const audios = document.querySelectorAll("audio");
  audios.forEach(a=>{
    a.play().then(()=>{
      a.pause();
      a.currentTime = 0;
    }).catch(()=>{});
  });
}

//////////////////////////////////////////////////////
// JUEGO
//////////////////////////////////////////////////////

let baby = {
  hunger: 50,
  energy: 50,
  comfort: 50
};

function play(id){
  let a = document.getElementById(id);
  if(!a) return;
  a.currentTime = 0;
  a.play().catch(()=>{});
}

function update(){
  document.getElementById("panel").innerText =
    "Hambre: " + baby.hunger +
    " | Energía: " + baby.energy +
    " | Confort: " + baby.comfort;
}

function feed(){
  play("bottle_drink");
  baby.hunger += 30;
  update();
}

function bottle(){
  play("bottle_prepare");
}

function playGame(){
  play("laugh");
}

function sleepBaby(){
  play("sleep");
  baby.energy += 30;
  update();
}

function bath(){
  play("bath_water");
  setTimeout(()=>play("bath_soap"), 1000);
  setTimeout(()=>play("bath_water"), 2000);
  setTimeout(()=>play("bath_dry"), 3000);
  baby.comfort += 20;
  update();
}

function diaper(){
  play("diaper_sound");
  baby.comfort += 20;
  update();
}

//////////////////////////////////////////////////////
// EVOLUCIÓN DEL BEBÉ
//////////////////////////////////////////////////////

setInterval(()=>{
  baby.hunger -= 1;
  baby.energy -= 1;
  baby.comfort -= 1;

  if(baby.hunger < 20) play("cry_hunger");
  else if(baby.energy < 20) play("cry_sleep");
  else if(baby.comfort < 20) play("cry_discomfort");

  update();

}, 10000);

update();

</script>

</body>
</html>
